<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reparto Casa Rural</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .js-helper-hidden {
      display: none !important;
    }

    .grid-two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .grid-two-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="card header-card">
      <h1>Reparto Casa Rural</h1>
    </header>

    <main class="grid-two-columns">
      <section class="card">
        <h2>Común</h2>
        <div id="items"></div>
      </section>

      <section class="card">
        <h2>Pagos</h2>
        <div id="payments"></div>
      </section>
    </main>

    <!-- Elementos ocultos para que app.js no falle -->
    <div class="js-helper-hidden">
      <button id="btnComunes">Comunes → todos</button>
      <button id="btnLimpiar">Limpiar pagos editables</button>
      <button id="btnCopiar">Copiar resumen</button>

      <div id="summary"></div>
      <div id="balance"></div>
      <div id="grandTotal"></div>
      <div id="assignedTotal"></div>
      <div id="difference"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
