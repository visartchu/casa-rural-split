<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reparto Casa Rural</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .js-helper-hidden {
      display: none !important;
    }

    .grid-two-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-weight: 600;
    }

    .filter-btn.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .grid-two-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="card header-card">
      <h1>Reparto Casa Rural</h1>
    </header>

    <main class="grid-two-columns">
      <section class="card">
        <h2>Productos</h2>

        <div class="filters">
          <button class="filter-btn active" data-filter="comun">Común</button>
          <button class="filter-btn" data-filter="alcohol_viernes">Alcohol Viernes</button>
          <button class="filter-btn" data-filter="alcohol_sabado">Alcohol Sábado</button>
        </div>

        <div id="items"></div>
      </section>

      <section class="card">
        <h2>Pagos</h2>
        <div id="payments"></div>
      </section>
    </main>

    <div class="js-helper-hidden">
      <button id="btnComunes">Comunes → todos</button>
      <button id="btnLimpiar">Limpiar pagos editables</button>
      <button id="btnCopiar">Copiar resumen</button>

      <div id="summary"></div>
      <div id="balance"></div>
      <div id="grandTotal"></div>
      <div id="assignedTotal"></div>
      <div id="difference"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
